---
layout: default
title: 게시글
permalink: /post/
---
<link rel="stylesheet" href="/assets/css/pages.css">

<div style="padding: 32px 0 64px; max-width: 720px; margin: 0 auto;">

  <div id="post-content">
    <p style="color:var(--text-muted);font-size:0.9rem">불러오는 중...</p>
  </div>

  <!-- 참석 섹션 (event만) -->
  <div id="section-attendees" style="display:none" class="mt-4">
    <p class="attendee-section-title">참석 현황 <span id="attendee-count" style="color:var(--text-primary);font-weight:700"></span></p>
    <div id="attendee-list" class="mb-3"></div>
    <button id="btn-attend" class="btn-attend-action join" style="display:none">참석 신청</button>
    <button id="btn-cancel" class="btn-attend-action cancel" style="display:none">참석 취소</button>
    <p id="msg-full" class="page-msg page-msg--error" style="display:none">정원이 마감됐습니다.</p>
  </div>

  <!-- 출석 확정 섹션 (작성자 전용, event만) -->
  <div id="section-confirm-attendance" style="display:none" class="mt-4">
    <p class="attendee-section-title">출석 확정 <span style="font-weight:400;color:var(--text-muted);font-size:0.75rem">(작성자 전용)</span></p>
    <button id="btn-close-event" class="btn-attend-action cancel mb-2">게임 일정 마감</button>
    <div id="confirm-attendance-list" class="mb-2"></div>
    <button id="btn-save-confirmed" class="btn-attend-action join">저장</button>
    <button id="btn-edit-confirmed" class="btn-attend-action join" style="display:none">수정</button>
    <p id="msg-confirm-saved" class="page-msg page-msg--success" style="display:none">저장했습니다.</p>
  </div>

  <!-- 평가 섹션 (참석자 전용, 자정 이후 노출) -->
  <div id="section-rating" style="display:none" class="mt-4">
    <p class="attendee-section-title">참석자 평가</p>
    <div id="rating-list"></div>
    <p id="msg-rating-done" class="page-msg page-msg--success" style="display:none">평가를 마쳤습니다.</p>
  </div>

  <!-- 댓글 섹션 (event만) -->
  <div id="section-comments" style="display:none">
    <div class="section-divider"></div>
    <p class="attendee-section-title">댓글</p>
    <div id="comment-list" class="mb-2"></div>
    <form id="form-comment">
      <div class="comment-input-row">
        <input type="text" id="input-comment" placeholder="댓글을 입력하세요" maxlength="200">
        <button type="submit">등록</button>
      </div>
    </form>
  </div>

  <div style="margin-top:32px">
    <a href="/board/" class="btn-back">← 목록으로</a>
  </div>

</div>

<script type="module" src="/assets/js/post.js"></script>
