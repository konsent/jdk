---
layout: default
title: 글 작성
permalink: /write/
---
<link rel="stylesheet" href="/assets/css/pages.css">

<div class="page-wrapper">
  <div class="page-card page-card--wide">
    <h1 class="page-card__title" id="page-title">글 작성</h1>
    <p class="page-card__subtitle" id="page-subtitle">일정 또는 공지를 등록합니다</p>

    <form id="form-write" class="page-form" novalidate>
      <div id="section-type" class="mb-3" style="display:none">
        <label class="form-label">글 유형</label>
        <select id="select-type" class="form-select">
          <option value="event">일정</option>
          <option value="notice">공지</option>
        </select>
      </div>

      <div id="section-author" class="mb-3" style="display:none">
        <label class="form-label">작성자로 지정</label>
        <select id="select-author" class="form-select">
          <option value="">본인(다소)으로 등록</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">제목 <span style="color:var(--danger)">*</span></label>
        <input type="text" id="input-title" class="form-control" placeholder="제목을 입력하세요" required>
      </div>

      <div id="section-event-fields">
        <div class="mb-3">
          <label class="form-label">일정 날짜 <span style="color:var(--danger)">*</span></label>
          <div style="display:flex;gap:8px">
            <input type="date" id="input-date" class="form-control" required>
            <select id="input-time-hour" class="form-select" style="max-width:90px">
              <option value="">시</option>
              <option value="00">0시</option>
              <option value="01">1시</option>
              <option value="02">2시</option>
              <option value="03">3시</option>
              <option value="04">4시</option>
              <option value="05">5시</option>
              <option value="06">6시</option>
              <option value="07">7시</option>
              <option value="08">8시</option>
              <option value="09">9시</option>
              <option value="10">10시</option>
              <option value="11">11시</option>
              <option value="12">12시</option>
              <option value="13">13시</option>
              <option value="14">14시</option>
              <option value="15">15시</option>
              <option value="16">16시</option>
              <option value="17">17시</option>
              <option value="18">18시</option>
              <option value="19">19시</option>
              <option value="20">20시</option>
              <option value="21">21시</option>
              <option value="22">22시</option>
              <option value="23">23시</option>
            </select>
            <select id="input-time-minute" class="form-select" style="max-width:90px">
              <option value="">분</option>
              <option value="00">00분</option>
              <option value="15">15분</option>
              <option value="30">30분</option>
              <option value="45">45분</option>
            </select>
          </div>
          <div class="form-text">시간을 선택하지 않으면 날짜만 표시됩니다.</div>
        </div>
        <div class="mb-3">
          <label class="form-label">최대 참석 인원 (본인 포함) <span style="color:var(--danger)">*</span></label>
          <input type="number" id="input-max" class="form-control" min="1" max="20" value="5" required>
        </div>
        <div class="mb-3">
          <label class="form-label">함께할 게임</label>
          <div style="position:relative">
            <input type="text" id="input-game-search" class="form-control" placeholder="게임 이름을 검색하세요 (예: 카탄)" autocomplete="off">
            <div id="game-candidates" class="game-candidates" style="display:none"></div>
          </div>
          <div id="selected-games" class="selected-games"></div>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label">내용 <span style="color:var(--danger)">*</span></label>
        <textarea id="input-content" class="form-control" rows="8" placeholder="내용을 입력하세요" required></textarea>
      </div>

      <div style="display:flex;gap:10px">
        <button type="submit" class="btn-page-primary" id="btn-submit" style="width:auto;padding:11px 32px">등록</button>
        <a id="btn-cancel" href="/board/" class="btn-page-secondary" style="width:auto;padding:11px 24px">취소</a>
      </div>
    </form>

    <div id="msg-error" class="page-msg page-msg--error" style="display:none"></div>
  </div>
</div>

<script type="module" src="/assets/js/write.js"></script>
